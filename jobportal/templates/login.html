{% extends "base.html" %}
{% block title %}Login — RoyalJobs{% endblock %}
{% block content %}
<section class="container auth-section">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <form method="post" class="auth-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required>
      <button type="submit" class="btn-primary full-width">Log In</button>
    </form>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>
</section>
{% endblock %}
